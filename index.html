```html
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Badal Guild Panel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
height:60px;
background:#020617;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:1px solid #1e293b;
}

.menu{
font-size:25px;
cursor:pointer;
}

.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#020617;
padding-top:60px;
transition:.3s;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid #1e293b;
}

.sidebar a:hover{
background:#0f172a;
}

.content{
padding:30px;
}

.card{
background:#020617;
border-radius:15px;
padding:30px;
margin-bottom:20px;
box-shadow:0 0 25px #1e3a8a;
text-align:center;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#9333ea,#3b82f6);
color:white;
cursor:pointer;
margin:5px;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:10px;
border:none;
}

.auth{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:300px;
background:#020617;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px #9333ea;
text-align:center;
}

</style>

</head>

<body>

<div id="loginPage" class="auth">

<div class="box">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">

<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>Don't have account? <a onclick="showRegister()">Sign Up</a></p>

</div>

</div>


<div id="registerPage" class="auth" style="display:none">

<div class="box">

<h2>Register</h2>

<input id="regUser" placeholder="Username">

<input id="regPass" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p>Already have account? <a onclick="showLogin()">Login</a></p>

</div>

</div>


<div id="panel" style="display:none">

<div class="topbar">

<span class="menu" onclick="toggleMenu()">☰</span>

<span style="margin-left:20px">Badal Guild Panel</span>

</div>

<div class="sidebar" id="sidebar">

<a onclick="home()">🏠 Home</a>
<a onclick="dashboard()">📊 Dashboard</a>
<a onclick="guild()">🏆 Guild Glory</a>
<a onclick="earn()">💰 Earn Credits</a>
<a onclick="daily()">🎁 Daily Reward</a>
<a onclick="transfer()">🔁 Transfer Credits</a>
<a onclick="buy()">🛒 Buy Credits</a>
<a onclick="admin()">⚙ Admin Panel</a>
<a onclick="logout()">🚪 Logout</a>

</div>

<div class="content" id="content"></div>

</div>


<script>

let sidebar=document.getElementById("sidebar")
let content=document.getElementById("content")

function toggleMenu(){
if(sidebar.style.left=="0px"){
sidebar.style.left="-250px"
}else{
sidebar.style.left="0px"
}
}

document.addEventListener("click",function(e){

if(!sidebar.contains(e.target) && !e.target.classList.contains("menu")){
sidebar.style.left="-250px"
}

})

function showRegister(){
loginPage.style.display="none"
registerPage.style.display="flex"
}

function showLogin(){
loginPage.style.display="flex"
registerPage.style.display="none"
}

function register(){

let u=document.getElementById("regUser").value
let p=document.getElementById("regPass").value

localStorage.setItem("user",u)
localStorage.setItem("pass",p)
localStorage.setItem("credits",100)

alert("Account Created")

showLogin()

}

function login(){

let u=document.getElementById("loginUser").value
let p=document.getElementById("loginPass").value

let su=localStorage.getItem("user")
let sp=localStorage.getItem("pass")

if(u==su && p==sp){

loginPage.style.display="none"
panel.style.display="block"

home()

}else{
alert("Wrong Login")
}

}

function logout(){
location.reload()
}

function home(){

let user=localStorage.getItem("user")
let credits=localStorage.getItem("credits")

content.innerHTML=`

<div class="card">

<h2>🏠 Welcome ${user}</h2>

<p>Welcome to Badal Guild Gaming Panel</p>

</div>

<div class="card">

<h3>💰 Credits</h3>

<p>${credits}</p>

</div>

<div class="card">

<h3>⚡ Quick Actions</h3>

<button onclick="earn()">Earn Credits</button>

<button onclick="buy()">Buy Credits</button>

<button onclick="transfer()">Transfer</button>

</div>

`

}

function dashboard(){

let credits=localStorage.getItem("credits")

content.innerHTML=`

<div class="card">

<h2>📊 Dashboard</h2>

<p>Total Credits : ${credits}</p>

</div>

`

}

function guild(){

content.innerHTML=`

<div class="card">

<h2>🏆 Guild Glory</h2>

<p>Top Guild Ranking Coming Soon</p>

</div>

`

}

function earn(){

let credits=parseInt(localStorage.getItem("credits"))

credits+=10

localStorage.setItem("credits",credits)

content.innerHTML=`

<div class="card">

<h2>💰 Earn Credits</h2>

<p>You earned 10 credits</p>

<p>Total : ${credits}</p>

</div>

`

}

function daily(){

let credits=parseInt(localStorage.getItem("credits"))

credits+=20

localStorage.setItem("credits",credits)

content.innerHTML=`

<div class="card">

<h2>🎁 Daily Reward</h2>

<p>You received 20 credits</p>

<p>Total : ${credits}</p>

</div>

`

}

function transfer(){

content.innerHTML=`

<div class="card">

<h2>🔁 Transfer Credits</h2>

<input id="tamount" placeholder="Amount">

<button onclick="send()">Send</button>

</div>

`

}

function send(){

let amount=parseInt(document.getElementById("tamount").value)

let credits=parseInt(localStorage.getItem("credits"))

if(amount<=credits){

credits-=amount

localStorage.setItem("credits",credits)

alert("Transfer Success")

home()

}else{

alert("Not enough credits")

}

}

function buy(){

content.innerHTML=`

<div class="card">

<h2>🛒 Buy Credits</h2>

<button onclick="buyCredit(100)">Buy 100</button>

<button onclick="buyCredit(500)">Buy 500</button>

<button onclick="buyCredit(1000)">Buy 1000</button>

</div>

`

}

function buyCredit(c){

let credits=parseInt(localStorage.getItem("credits"))

credits+=c

localStorage.setItem("credits",credits)

alert("Purchase Success")

home()

}

function admin(){

content.innerHTML=`

<div class="card">

<h2>⚙ Admin Panel</h2>

<p>Admin Tools Coming Soon</p>

</div>

`

}

</script>

</body>

</html>
```

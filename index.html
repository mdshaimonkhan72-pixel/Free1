<!DOCTYPE html>
<html>
<head>
<title>Guild Glory Boost</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(270deg,#0f0c29,#302b63,#24243e);
background-size:600% 600%;
animation:bgMove 10s infinite alternate;
color:white;
text-align:center;
}

@keyframes bgMove{
0%{background-position:0%}
100%{background-position:100%}
}

/* menu */

.menuBtn{
position:fixed;
top:20px;
right:20px;
font-size:28px;
cursor:pointer;
display:none;
}

.sidebar{
position:fixed;
top:0;
right:-200px;
width:200px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
box-shadow:0 0 20px cyan;
}

.sidebar button{
width:100%;
margin-top:20px;
}

/* box */

.box{
background:#111;
margin:40px;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px cyan;
}

/* input */

input{
padding:12px;
margin:10px;
width:220px;
border-radius:6px;
border:2px solid cyan;
background:black;
color:white;
}

/* button */

button{
padding:10px 20px;
background:linear-gradient(45deg,orange,magenta);
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* cards */

.card{
background:#111;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 20px purple;
display:none;
}

/* notification */

#notify{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(45deg,cyan,magenta);
color:white;
padding:15px 30px;
border-radius:10px;
font-weight:bold;
display:none;
box-shadow:0 0 20px cyan;
}

a{
color:cyan;
cursor:pointer;
}

</style>

</head>

<body>

<div id="notify"></div>

<div class="menuBtn" id="menuBtn" onclick="menuToggle()">☰</div>

<div class="sidebar" id="menu">
<h3>Menu</h3>
<button onclick="logout()">Logout</button>
</div>

<div id="app"></div>

<script>

/* notification */

function notify(msg){

let box=document.getElementById("notify")

box.innerText=msg
box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

/* start */

if(localStorage.getItem("login")=="true"){
showMain()
}else{
showLogin()
}

/* LOGIN */

function showLogin(){

document.getElementById("menuBtn").style.display="none"

document.getElementById("app").innerHTML=`

<div class="box">

<h1>Login</h1>

<input id="user" placeholder="Username">

<br>

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<p>No account? <a onclick="showRegister()">Register</a></p>

</div>

`

}

/* REGISTER */

function showRegister(){

document.getElementById("app").innerHTML=`

<div class="box">

<h1>Create Account</h1>

<input id="user" placeholder="Username">

<br>

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="register()">Register</button>

<p>Already account? <a onclick="showLogin()">Login</a></p>

</div>

`

}

/* MAIN */

function showMain(){

document.getElementById("menuBtn").style.display="block"

document.getElementById("app").innerHTML=`

<div class="box">

<h1>🔥 Guild Glory Boost</h1>

<p>Enter UID to Unlock Boost</p>

<input id="uid" placeholder="Enter UID">

<br>

<button onclick="submitUID()">Submit UID</button>

</div>

<div class="card" id="card1">
<h2>120K → 200K Glory</h2>
<p>Delivery 30 Minutes</p>
<button onclick="boost()">Boost Now</button>
</div>

<div class="card" id="card2">
<h2>200K → 400K Glory</h2>
<p>Delivery 1 Hour</p>
<button onclick="boost()">Boost Now</button>
</div>

<div class="card" id="card3">
<h2>400K → 800K Glory</h2>
<p>Delivery 2 Hours</p>
<button onclick="boost()">Boost Now</button>
</div>

`

}

/* REGISTER FUNCTION */

function register(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

localStorage.setItem("username",u)
localStorage.setItem("password",p)

notify("Account Created ✅")

showLogin()

}

/* LOGIN FUNCTION */

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

let su=localStorage.getItem("username")
let sp=localStorage.getItem("password")

if(u==su && p==sp){

localStorage.setItem("login","true")

notify("Login Success 🎉")

showMain()

}else{

notify("Wrong Username or Password ❌")

}

}

/* MENU */

function menuToggle(){

let menu=document.getElementById("menu")

if(menu.style.right=="0px"){
menu.style.right="-200px"
}else{
menu.style.right="0px"
}

}

/* UID */

function submitUID(){

let uid=document.getElementById("uid").value

if(uid==""){
notify("Enter UID first")
return
}

document.getElementById("card1").style.display="block"
document.getElementById("card2").style.display="block"
document.getElementById("card3").style.display="block"

notify("UID Submitted 🚀")

}

/* BOOST */

function boost(){

notify("Boost Request Received 🔥")

}

/* LOGOUT */

function logout(){

localStorage.removeItem("login")

notify("Logged Out")

showLogin()

}

</script>

</body>
</html>

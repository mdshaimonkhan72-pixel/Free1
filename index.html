<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BADAL GUILD GLORY - OFFICIAL TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap');
        :root { --bg-dark: #00080a; --cyan-main: #00f0ff; --border-color: #004a5a; --neon-green: #39ff14; }
        body { background-color: var(--bg-dark); color: #e2e8f0; font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.12; pointer-events: none; }
        .glass-card { background: rgba(10, 25, 30, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 12px; padding: 20px; position: relative; z-index: 10; }
        .sidebar { width: 280px; background: rgba(2, 8, 12, 0.98); height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid var(--border-color); transition: 0.4s; z-index: 1000; }
        .sidebar.collapsed { transform: translateX(-100%); }
        .main-content { margin-left: 280px; padding: 20px; transition: 0.4s; }
        .main-content.expanded { margin-left: 0; }
        @media (max-width: 1024px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0 !important; } }
        .nav-item { display: flex; align-items: center; padding: 12px 20px; margin: 5px 15px; border-radius: 8px; cursor: pointer; color: #8899a6; font-weight: 600; }
        .nav-item.active { background: rgba(0, 240, 255, 0.1); color: var(--cyan-main); }
        .bot-input { background: rgba(0, 0, 0, 0.5); border: 1px solid var(--border-color); color: var(--cyan-main); padding: 12px; border-radius: 6px; width: 100%; font-family: 'Share Tech Mono', monospace; outline: none; }
        .bot-btn { background: var(--cyan-main); color: #000; font-weight: bold; padding: 12px; border-radius: 6px; width: 100%; text-transform: uppercase; cursor: pointer; border: none; }
        .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(57, 255, 20, 0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    
    <section id="auth-container" class="flex items-center justify-center min-h-screen p-6 relative">
        <div id="login-screen" class="glass-card w-full max-w-md text-center">
            <h1 class="cyber-font text-2xl font-bold mb-4 text-cyan-400">BGG TERMINAL</h1>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="user" placeholder="Alias Name" required class="bot-input">
                <input type="password" id="pass" placeholder="Password" required class="bot-input">
                <button type="submit" class="bot-btn">Establish Uplink</button>
            </form>
            <p class="mt-4 text-xs">New user? <button onclick="toggleAuth('reg')" class="text-cyan-400">Register</button></p>
        </div>
        <div id="reg-screen" class="glass-card w-full max-w-md text-center hidden">
            <h1 class="cyber-font text-2xl font-bold mb-4">NEW IDENTITY</h1>
            <form id="regForm" class="space-y-4">
                <input type="text" id="reg-user" placeholder="Create Alias" required class="bot-input">
                <input type="password" id="reg-pass" placeholder="Password" required class="bot-input">
                <button type="submit" class="bot-btn">Register</button>
            </form>
            <button onclick="toggleAuth('log')" class="mt-4 text-xs text-cyan-400">Back to Login</button>
        </div>
    </section>

    <section id="dashboard-screen" class="hidden min-h-screen">
        <aside class="sidebar" id="sidebar">
            <div class="p-8 border-b border-cyan-950 text-center">
                <h2 class="cyber-font text-lg font-bold">BGG_OFFICIAL</h2>
            </div>
            <nav class="mt-6">
                <div class="nav-item active" onclick="showSec('home')"><i class="fas fa-home mr-3"></i> Dashboard</div>
                <div class="nav-item" onclick="showSec('bots')"><i class="fas fa-robot mr-3"></i> Bot Control</div>
                <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt mr-3"></i> Logout</div>
            </nav>
        </aside>
        <main class="main-content" id="main-content">
            <header class="flex justify-between items-center mb-6">
                <button onclick="toggleSidebar()" class="text-cyan-400 text-2xl"><i class="fas fa-bars"></i></button>
                <div id="clock" class="text-cyan-400 font-mono">00:00:00</div>
            </header>

            <div id="home-sec" class="sec">
                <div class="glass-card">
                    <h2 class="text-2xl font-bold">Welcome, Commander!</h2>
                    <p class="text-gray-400 text-sm">System is online and ready for commands.</p>
                </div>
            </div>

            <div id="bots-sec" class="sec hidden space-y-6">
                <div class="glass-card">
                    <h2 class="cyber-font text-lg font-bold mb-4">FAST BOT DEPLOY</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="uid" placeholder="Enter Player UID" class="bot-input">
                        <select id="cmd" class="bot-input">
                            <option value="claim">Auto Claim</option>
                            <option value="sync">Sync Data</option>
                        </select>
                    </div>
                    <button onclick="runBot()" class="bot-btn mt-4">Execute</button>
                </div>
                <div class="glass-card">
                    <h3 class="text-xs font-bold mb-4">LOGS</h3>
                    <div id="logs" class="text-xs font-mono space-y-2"></div>
                </div>
            </div>
        </main>
    </section>

    <script>
        const getDB = () => JSON.parse(localStorage.getItem('bgg_db') || '[]');
        const setDB = (d) => localStorage.setItem('bgg_db', JSON.stringify(d));

        function toggleAuth(t) {
            document.getElementById('login-screen').classList.toggle('hidden', t === 'reg');
            document.getElementById('reg-screen').classList.toggle('hidden', t === 'log');
        }

        document.getElementById('regForm').onsubmit = (e) => {
            e.preventDefault();
            let db = getDB();
            db.push({u: document.getElementById('reg-user').value, p: document.getElementById('reg-pass').value});
            setDB(db);
            alert("Registered!"); toggleAuth('log');
        };

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = getDB().find(x => x.u === document.getElementById('user').value && x.p === document.getElementById('pass').value);
            if(user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
            } else alert("Invalid Login");
        };

        function showSec(id) {
            document.querySelectorAll('.sec').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + '-sec').classList.remove('hidden');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('main-content').classList.toggle('expanded');
        }

        function runBot() {
            const uid = document.getElementById('uid').value;
            if(!uid) return alert("Enter UID");
            const log = document.getElementById('logs');
            const div = document.createElement('div');
            div.innerHTML = `[${new Date().toLocaleTimeString()}] Target: ${uid} - <span class="status-pill">SUCCESS</span>`;
            log.prepend(div);
        }

        function logout() { location.reload(); }

        // Matrix Effect
        const c = document.getElementById('matrix-bg');
        const ctx = c.getContext('2d');
        let drops;
        function resize() { c.width = window.innerWidth; c.height = window.innerHeight; drops = Array(Math.floor(c.width/20)).fill(1); }
        window.onresize = resize; resize();
        function draw() {
            ctx.fillStyle = 'rgba(0, 8, 10, 0.05)'; ctx.fillRect(0, 0, c.width, c.height);
            ctx.fillStyle = '#00f0ff'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*20, y*20);
                if(y*20 > c.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
            });
        }
        setInterval(draw, 50);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>

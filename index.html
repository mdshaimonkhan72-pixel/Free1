<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Guild Glory Bot</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(270deg,#0b0620,#1a0f3d,#0b0620);
background-size:600% 600%;
animation:bg 10s infinite alternate;
color:white;
text-align:center;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#0c0820;
}

.menuBtn{
font-size:28px;
cursor:pointer;
display:none;
}

/* dropdown menu */

.dropdown{
display:none;
position:absolute;
top:60px;
left:15px;
background:#111;
padding:15px;
border-radius:10px;
box-shadow:0 0 25px purple;
}

.dropdown button{
display:block;
width:160px;
margin:8px 0;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,cyan,magenta);
color:white;
cursor:pointer;
}

/* login box */

.box{
background:#0d0922;
margin:40px;
padding:30px;
border-radius:15px;
box-shadow:0 0 30px purple;
}

input{
padding:12px;
width:220px;
border-radius:6px;
border:2px solid cyan;
background:black;
color:white;
margin:10px;
}

button{
padding:10px 20px;
background:linear-gradient(45deg,orange,magenta);
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

a{
color:cyan;
cursor:pointer;
}

/* dashboard */

.card{
background:#0d0922;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px purple;
}

</style>

</head>

<body>

<div class="header">

<div class="menuBtn" id="menuBtn" onclick="toggleMenu()">☰</div>

<div>🔔</div>

<div>9990 Credits</div>

</div>

<div class="dropdown" id="menu">

<button onclick="showDashboard()">Dashboard</button>

<button onclick="logout()">Logout</button>

</div>

<div id="app"></div>

<script>

/* start */

if(localStorage.getItem("login")=="true"){

document.getElementById("menuBtn").style.display="block"
showDashboard()

}else{

showLogin()

}

/* menu toggle */

function toggleMenu(){

let menu=document.getElementById("menu")

if(menu.style.display=="block"){

menu.style.display="none"

}else{

menu.style.display="block"

}

}

/* login */

function showLogin(){

document.getElementById("menuBtn").style.display="none"

document.getElementById("app").innerHTML=`

<div class="box">

<h1>Login</h1>

<input id="user" placeholder="Username">

<br>

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<p>No account? <a onclick="showRegister()">Register</a></p>

</div>

`

}

/* register */

function showRegister(){

document.getElementById("app").innerHTML=`

<div class="box">

<h1>Register</h1>

<input id="user" placeholder="Username">

<br>

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="register()">Register</button>

<p>Already account? <a onclick="showLogin()">Login</a></p>

</div>

`

}

/* dashboard */

function showDashboard(){

let user=localStorage.getItem("username")

document.getElementById("app").innerHTML=`

<div class="card">

<h2>Hello ${user} 👋</h2>

<p>Welcome to Guild Glory Bot</p>

<p id="time"></p>

</div>

<div class="card">📱 Mobile Info</div>

<div class="card">🌐 IP Address</div>

<div class="card">💻 Browser</div>

<div class="card">📦 OS</div>

<div class="card">🔋 Battery</div>

<div class="card">🎮 Total Orders</div>

`

updateTime()

}

/* register */

function register(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="" || p==""){

alert("Fill all fields")
return

}

localStorage.setItem("username",u)
localStorage.setItem("password",p)

alert("Account Created")

showLogin()

}

/* login */

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

let su=localStorage.getItem("username")
let sp=localStorage.getItem("password")

if(u==su && p==sp){

localStorage.setItem("login","true")

document.getElementById("menuBtn").style.display="block"

showDashboard()

}else{

alert("Wrong Username or Password")

}

}

/* logout */

function logout(){

localStorage.removeItem("login")

location.reload()

}

/* time */

function updateTime(){

setInterval(()=>{

let now=new Date()

document.getElementById("time").innerText=now.toLocaleString()

},1000)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guild Glory Boost</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(270deg,#0f0c29,#302b63,#24243e);
background-size:600% 600%;
animation:bg 10s infinite alternate;
color:white;
text-align:center;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

/* notification */

#notify{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(45deg,cyan,magenta);
padding:15px 25px;
border-radius:10px;
display:none;
box-shadow:0 0 20px cyan;
}

/* side menu */

.sidebar{
position:fixed;
left:-220px;
top:0;
width:220px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
box-shadow:5px 0 20px cyan;
}

.sidebar h3{
margin-top:0;
}

/* menu button */

.menuBtn{
position:fixed;
left:15px;
top:50%;
transform:translateY(-50%);
background:linear-gradient(45deg,cyan,magenta);
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
box-shadow:0 0 20px cyan;
}

/* box */

.box{
background:#111;
margin:40px;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px cyan;
}

/* input */

input{
padding:12px;
width:220px;
border-radius:6px;
border:2px solid cyan;
background:black;
color:white;
}

/* button */

button{
padding:10px 20px;
background:linear-gradient(45deg,orange,magenta);
border:none;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:10px;
}

/* cards */

.card{
background:#111;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 20px purple;
display:none;
}

a{
color:cyan;
cursor:pointer;
}

</style>
</head>

<body>

<div id="notify"></div>

<div class="menuBtn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="menu">
<h3>Menu</h3>
<button onclick="showMain()">Home</button>
<button onclick="logout()">Logout</button>
</div>

<div id="app"></div>

<script>

/* notification */

function notify(msg){

let box=document.getElementById("notify")

box.innerText=msg
box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

/* start */

if(localStorage.getItem("login")=="true"){
showMain()
}else{
showLogin()
}

/* menu */

function toggleMenu(){

let menu=document.getElementById("menu")

if(menu.style.left=="0px"){
menu.style.left="-220px"
}else{
menu.style.left="0px"
}

}

/* login */

function showLogin(){

document.getElementById("app").innerHTML=`

<div class="box">

<h1>Login</h1>

<input id="user" placeholder="Username">

<br>

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<p>No account? <a onclick="showRegister()">Register</a></p>

</div>

`

}

/* register */

function showRegister(){

document.getElementById("app").innerHTML=`

<div class="box">

<h1>Create Account</h1>

<input id="user" placeholder="Username">

<br>

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="register()">Register</button>

<p>Already account? <a onclick="showLogin()">Login</a></p>

</div>

`

}

/* main */

function showMain(){

document.getElementById("app").innerHTML=`

<div class="box" id="uidPanel">

<h1>🔥 Guild Glory Boost</h1>

<p>Enter UID to Unlock Boost</p>

<input id="uid" placeholder="Enter UID">

<br>

<button onclick="submitUID()">Submit UID</button>

</div>

<div class="card" id="card1">
<h2>120K → 200K Glory</h2>
<p>Delivery 30 Minutes</p>
<button onclick="boost()">Boost Now</button>
</div>

<div class="card" id="card2">
<h2>200K → 400K Glory</h2>
<p>Delivery 1 Hour</p>
<button onclick="boost()">Boost Now</button>
</div>

<div class="card" id="card3">
<h2>400K → 800K Glory</h2>
<p>Delivery 2 Hours</p>
<button onclick="boost()">Boost Now</button>
</div>

`

}

/* register function */

function register(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

localStorage.setItem("username",u)
localStorage.setItem("password",p)

notify("Account Created")

showLogin()

}

/* login function */

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

let su=localStorage.getItem("username")
let sp=localStorage.getItem("password")

if(u==su && p==sp){

localStorage.setItem("login","true")

notify("Login Success")

showMain()

}else{

notify("Wrong Username or Password")

}

}

/* uid submit */

function submitUID(){

let uid=document.getElementById("uid").value

if(uid==""){
notify("Enter UID First")
return
}

/* hide panel */

document.getElementById("uidPanel").style.display="none"

/* show cards */

document.getElementById("card1").style.display="block"
document.getElementById("card2").style.display="block"
document.getElementById("card3").style.display="block"

notify("UID Submitted")

}

/* boost */

function boost(){

notify("Boost Request Received")

}

/* logout */

function logout(){

localStorage.removeItem("login")

notify("Logged Out")

location.reload()

}

</script>

</body>
</html>

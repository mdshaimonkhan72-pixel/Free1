<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Guild Glory Bot</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(270deg,#09061a,#140b33,#09061a);
background-size:600% 600%;
animation:bg 10s infinite alternate;
color:white;
text-align:center;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

.header{
display:flex;
justify-content:space-between;
padding:15px;
background:#0c0820;
box-shadow:0 0 20px purple;
}

.menuBtn{
font-size:26px;
cursor:pointer;
}

.credit{
color:#8df;
}

/* menu */

.sidebar{
position:fixed;
left:-240px;
top:0;
width:240px;
height:100%;
background:#0c0820;
padding:20px;
transition:0.3s;
}

.sidebar button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:linear-gradient(45deg,cyan,magenta);
color:white;
border-radius:6px;
cursor:pointer;
}

/* box */

.box{
background:#0d0922;
margin:40px;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px purple;
}

input{
padding:12px;
width:220px;
border-radius:6px;
border:2px solid cyan;
background:black;
color:white;
margin:10px;
}

button{
padding:10px 20px;
background:linear-gradient(45deg,orange,magenta);
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* dashboard */

.mainCard{
margin:20px;
padding:25px;
border-radius:20px;
background:#100a2a;
box-shadow:0 0 40px purple;
}

.username{
font-size:30px;
color:orange;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.card{
background:#0d0922;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px purple;
}

.card span{
display:block;
font-size:13px;
color:#aaa;
}

a{
color:cyan;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div class="menuBtn" onclick="toggleMenu()">☰</div>

<div>🔔</div>

<div class="credit">9990 Credits</div>

</div>

<div class="sidebar" id="menu">

<h3>Menu</h3>

<button onclick="showDashboard()">Dashboard</button>

<button onclick="logout()">Logout</button>

</div>

<div id="app"></div>

<script>

/* start */

if(localStorage.getItem("login")=="true"){

showDashboard()

}else{

showLogin()

}

/* menu */

function toggleMenu(){

let menu=document.getElementById("menu")

if(menu.style.left=="0px"){

menu.style.left="-240px"

}else{

menu.style.left="0px"

}

}

/* login */

function showLogin(){

document.getElementById("app").innerHTML=`

<div class="box">

<h1>Login</h1>

<input id="user" placeholder="Username">

<br>

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<p>No account? <a onclick="showRegister()">Register</a></p>

</div>

`

}

/* register */

function showRegister(){

document.getElementById("app").innerHTML=`

<div class="box">

<h1>Register</h1>

<input id="user" placeholder="Username">

<br>

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="register()">Register</button>

<p>Already account? <a onclick="showLogin()">Login</a></p>

</div>

`

}

/* dashboard */

function showDashboard(){

let user=localStorage.getItem("username")

document.getElementById("app").innerHTML=`

<div class="mainCard">

<h3>Hello user 👋</h3>

<div class="username">${user}</div>

<p>Welcome to Badal Guild Glory bot</p>

<p id="time"></p>

</div>

<div class="grid">

<div class="card">📱 V2439<span>Mobile</span></div>

<div class="card">🌐 IP<span>Address</span></div>

<div class="card">💻 Chrome<span>Browser</span></div>

<div class="card">📦 Android<span>OS</span></div>

<div class="card">📶 3G<span>Internet</span></div>

<div class="card">🔋 33%<span>Battery</span></div>

<div class="card">📺 393x870<span>Screen</span></div>

<div class="card">🧠 8 Core<span>CPU</span></div>

<div class="card">🌍 EN<span>Language</span></div>

<div class="card">🎮 3<span>Total Orders</span></div>

<div class="card">🏆 3<span>Success</span></div>

<div class="card">🔥 0<span>Failed</span></div>

</div>

`

updateTime()

}

/* register */

function register(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

localStorage.setItem("username",u)
localStorage.setItem("password",p)

alert("Account Created")

showLogin()

}

/* login */

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

let su=localStorage.getItem("username")
let sp=localStorage.getItem("password")

if(u==su && p==sp){

localStorage.setItem("login","true")

showDashboard()

}else{

alert("Wrong Username or Password")

}

}

/* logout */

function logout(){

localStorage.removeItem("login")

location.reload()

}

/* time */

function updateTime(){

setInterval(()=>{

let now=new Date()

document.getElementById("time").innerText=now.toLocaleString()

},1000)

}

</script>

</body>
</html>

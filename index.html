<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Badal Guild Panel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* banner */

.banner{
text-align:center;
padding:10px;
background:#0b1133;
color:#00eaff;
}

/* header */

.header{
height:60px;
display:flex;
align-items:center;
padding:0 15px;
border-bottom:1px solid #222;
}

.menuBtn{
font-size:26px;
cursor:pointer;
}

/* sidebar */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#060c24;
transition:.3s;
padding-top:80px;
z-index:10;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
font-size:18px;
}

.sidebar a:hover{
background:#11173a;
}

/* content */

#content{
padding:20px;
}

/* cards */

.card{
margin:25px auto;
max-width:600px;
padding:25px;
background:#0a1030;
border-radius:12px;
box-shadow:0 0 25px #1328a8;
text-align:center;
}

/* login */

.box{
width:90%;
max-width:360px;
margin:100px auto;
padding:35px;
background:#0c1238;
border-radius:15px;
box-shadow:0 0 30px purple;
text-align:center;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:1px solid #444;
background:black;
color:white;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#9333ea,#06b6d4);
color:white;
cursor:pointer;
}

.link{
color:#00eaff;
cursor:pointer;
}

</style>
</head>

<body>

<div class="banner" id="banner">📢 Welcome to Badal Guild Panel</div>

<div class="sidebar" id="sidebar">

<a onclick="home()">🏠 Home</a>
<a onclick="dashboard()">📊 Dashboard</a>
<a onclick="guild()">🏆 Guild Glory</a>
<a onclick="earn()">💰 Earn Credits</a>
<a onclick="daily()">🎁 Daily Reward</a>
<a onclick="transfer()">💸 Transfer Credits</a>
<a onclick="buy()">🛒 Buy Credits</a>
<a onclick="admin()">🛠 Admin Panel</a>
<a onclick="logout()">🚪 Logout</a>

</div>

<div id="app"></div>

<script>

/* start */

if(localStorage.getItem("login")=="true"){
mainUI()
}else{
loginPage()
}

/* login */

function loginPage(){

app.innerHTML=`

<div class="box">

<h2>Login</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<p id="msg"></p>

<button onclick="login()">Login</button>

<p>No account? <span class="link" onclick="registerPage()">Register</span></p>

</div>

`

}

/* register */

function registerPage(){

app.innerHTML=`

<div class="box">

<h2>Register</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<p id="msg"></p>

<button onclick="register()">Register</button>

<p>Already account? <span class="link" onclick="loginPage()">Login</span></p>

</div>

`

}

function register(){

localStorage.setItem("username",user.value)
localStorage.setItem("password",pass.value)
localStorage.setItem("credits",100)

msg.innerHTML="Account Created"

setTimeout(loginPage,1000)

}

/* login */

function login(){

if(user.value==localStorage.getItem("username") &&
pass.value==localStorage.getItem("password")){

localStorage.setItem("login","true")
mainUI()

}else{

msg.innerHTML="Wrong login"

}

}

/* main UI */

function mainUI(){

app.innerHTML=`

<div class="header">

<div class="menuBtn" onclick="toggleMenu()">☰</div>

</div>

<div id="content"></div>

`

home()

}

/* sidebar toggle */

function toggleMenu(){

let s=document.getElementById("sidebar")

if(s.style.left=="0px"){
s.style.left="-260px"
}else{
s.style.left="0px"
}

}

/* outside click hide menu */

document.addEventListener("click",function(e){

let sidebar=document.getElementById("sidebar")

if(!sidebar.contains(e.target) && !e.target.classList.contains("menuBtn")){
sidebar.style.left="-260px"
}

})

/* pages */

function home(){

content.innerHTML=`

<div class="card">

<h2>🏠 Home</h2>

<p>Welcome to Badal Guild Panel</p>

</div>

`

}

/* dashboard */

function dashboard(){

let user=localStorage.getItem("username")
let credits=localStorage.getItem("credits")

content.innerHTML=`

<div class="card">

<h2>📊 Dashboard</h2>

<p>User: ${user}</p>

<p>Credits: ${credits}</p>

</div>

`

}

/* guild */

function guild(){

content.innerHTML=`

<div class="card">

<h2>🏆 Guild Glory</h2>

<p>Guild achievements coming soon</p>

</div>

`

}

/* earn */

function earn(){

let c=parseInt(localStorage.getItem("credits"))
c+=10

localStorage.setItem("credits",c)

content.innerHTML=`

<div class="card">

<h2>💰 Earn Credits</h2>

<p>You earned 10 credits</p>

</div>

`

}

/* daily reward */

function daily(){

let last=localStorage.getItem("daily")
let now=Date.now()

if(!last || now-last>86400000){

let c=parseInt(localStorage.getItem("credits"))
c+=50

localStorage.setItem("credits",c)
localStorage.setItem("daily",now)

content.innerHTML=`

<div class="card">

<h2>🎁 Daily Reward</h2>

<p>You received 50 credits</p>

</div>

`

}else{

content.innerHTML=`

<div class="card">

<h2>⏳ Come back tomorrow</h2>

</div>

`

}

}

/* transfer */

function transfer(){

content.innerHTML=`

<div class="card">

<h2>💸 Transfer Credits</h2>

<input id="tamount" placeholder="Amount">

<button onclick="sendCredits()">Send</button>

</div>

`

}

function sendCredits(){

alert("Transfer system demo")

}

/* shop */

function buy(){

content.innerHTML=`

<div class="card">

<h2>🛒 Buy Credits</h2>

<button onclick="buyCredits(100)">Buy 100</button>
<br><br>
<button onclick="buyCredits(500)">Buy 500</button>

</div>

`

}

function buyCredits(a){

let c=parseInt(localStorage.getItem("credits"))
c+=a

localStorage.setItem("credits",c)

alert("Credits added")

}

/* admin */

function admin(){

content.innerHTML=`

<div class="card">

<h2>🛠 Admin Panel</h2>

<input id="ann" placeholder="Announcement">

<button onclick="setAnn()">Update Banner</button>

</div>

`

}

function setAnn(){

banner.innerText="📢 "+ann.value

}

/* logout */

function logout(){

localStorage.removeItem("login")
location.reload()

}

</script>

</body>
</html>
